# This GitHub Action automates the process of building, signing, and releasing Grafana plugins.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Sign plugin
        run: npm run sign
        env:
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}

      - name: Package plugin
        run: npm run package

      - name: Locate built artifact
        id: artifact
        run: |
          file=$(ls vtexio-grafana-plugin-build/*.zip | head -n1)
          if [ -z "$file" ]; then
            echo "No .zip found in vtexio-grafana-plugin-build/"; exit 1
          fi
          echo "path=$file" >> $GITHUB_OUTPUT
          echo "name=$(basename "$file")" >> $GITHUB_OUTPUT

      - name: Upload signed plugin to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
